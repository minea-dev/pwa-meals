<div class="page-container">
  <div class="header-actions">
    <h2>Recipe Catalog</h2>

    <div class="view-toggles">
      <button mat-icon-button (click)="toggleView('cards')" [color]="viewMode === 'cards' ? 'primary' : ''">
        <mat-icon>grid_view</mat-icon>
      </button>
      <button mat-icon-button (click)="toggleView('grid')" [color]="viewMode === 'grid' ? 'primary' : ''">
        <mat-icon>list</mat-icon>
      </button>
    </div>
  </div>

  @if (isLoading) {
    <div class="spinner-container">
      <mat-spinner></mat-spinner>
    </div>
  } @else {
    <div @fadeIn class="content-container">
      @if (viewMode === 'cards') {
        <div class="cards-container">
          @for (meal of meals; track meal.idMeal) {
            <app-meal-card [meal]="meal" (click)="goToDetail(meal.idMeal)"></app-meal-card>
          } @empty {
            <p>No recipes found.</p>
          }
        </div>
      } @else {
        <app-meal-grid [meals]="meals" (rowClick)="goToDetail($event)"></app-meal-grid>
      }
    </div>
  }
</div>
